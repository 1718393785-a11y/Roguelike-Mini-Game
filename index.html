<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>千里走单骑</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="ui/game-ui.css">
    <script>
        (function () {
            const isGitHubPages = window.location.hostname.endsWith('github.io')
            const isLocalDev = ['127.0.0.1', 'localhost', '::1'].includes(window.location.hostname)
            const params = new URLSearchParams(window.location.search)
            const artKeys = [
                'artAssets',
                'artWeaponIcons',
                'artSkillIcons',
                'artPickups',
                'artA1A2',
                'artEnemies',
                'artBosses',
                'artPlayer',
                'artTiles',
                'artEffects',
                'artUi',
                'artUISkin',
                'artHud',
                'artPreview'
            ]
            const devKeys = [
                'domUi',
                'audio',
                'stateMusic',
                'domWeaponCd',
                'pickupMerge',
                'aiTuning',
                'qinqiPhantoms',
                'ENABLE_LARGE_MAP_CAMERA',
                'ENABLE_GAME_SETTINGS',
                'ENABLE_WEAPON_COOLDOWN_HUD'
            ]
            const hasArtParam = artKeys.some(key => params.has(key))
            const hasDevParam = devKeys.some(key => params.has(key))

            if ((!isGitHubPages && !isLocalDev) || (hasArtParam && hasDevParam)) return

            if (!params.has('seed')) params.set('seed', '12345')
            params.set('artA1A2', '1')
            params.set('artEnemies', '1')
            params.set('artPlayer', '1')
            params.set('artTiles', '1')
            params.set('artEffects', '1')
            params.set('artUi', '1')
            params.set('artHud', '1')
            if (isLocalDev) {
                params.set('domUi', '1')
                params.set('audio', '1')
                params.set('stateMusic', '1')
                params.set('domWeaponCd', '1')
                params.set('pickupMerge', '1')
                params.set('aiTuning', '1')
                params.set('qinqiPhantoms', '1')
                params.set('ENABLE_LARGE_MAP_CAMERA', '1')
                params.set('ENABLE_GAME_SETTINGS', '1')
                params.set('ENABLE_WEAPON_COOLDOWN_HUD', '1')
            }
            window.location.replace(`${window.location.pathname}?${params.toString()}${window.location.hash}`)
        })()
    </script>
</head>
<body data-boot-state="loading">
    <div id="bootOverlay" role="status" aria-live="polite">
        <div class="boot-panel">
            <div class="boot-title">Loading Assets</div>
            <div id="bootMessage" class="boot-message">Preparing game runtime...</div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="gameUiRoot" class="game-ui-root" aria-live="polite"></div>
    <script src="GameSettings.js"></script>
    <script src="AudioManager.js"></script>
    <script src="AssetRuntime.js"></script>
    <script src="ui/UIBridge.js"></script>
    <script src="game.js"></script>
</body>
</html>
