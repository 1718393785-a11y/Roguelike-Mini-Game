name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static artifact
        run: |
          mkdir -p _site _site/src
          cp index.html _site/
          cp style.css _site/
          cp game.js _site/
          cp GameSettings.js _site/
          cp AssetRuntime.js _site/
          cp AudioManager.js _site/
          cp -R assets _site/assets
          cp -R src/spec _site/src/spec
          cp -R vendor _site/vendor
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
